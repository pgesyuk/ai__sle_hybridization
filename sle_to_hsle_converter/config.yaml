# HSLE Converter — config.yaml
# Global defaults + project registry for multi-project support.
# All settings can be overridden via CLI flags.

# ── ADDED file conflict policy ───────────────────────────────────────────────
# Controls what happens when an ADDED file's relative path already exists in
# the new SLE model being converted.
#
#   manual  (recommended) — flag for human review; safe for versioned models
#   auto    — overwrite if content differs from ref_hsle; risky for new variants
#
added_conflict_policy: manual

# ── REMOVED file safety check ───────────────────────────────────────────────
# When true: only auto-delete if the file in the new model still matches the
# reference SLE content exactly (i.e. it was not updated in the new model).
# When false: always delete, regardless of content.
#
removed_safety_check: true

# ── MODIFIED file merge strategy ────────────────────────────────────────────
#   3way  — git merge-file only; flag 'conflicts' if any conflict markers remain
#   llm   — use GitHub Copilot LLM only (no 3-way attempt)
#   auto  — try 3-way first; fall back to LLM on conflict/error; flag if LLM fails
#
patch_mode: auto

# ── LLM file size limits ─────────────────────────────────────────────────────
# Files exceeding either limit are flagged as 'too_large' and go to manual review
# instead of being sent to the LLM.  Generous limits are safe because GPT-4o
# supports a 128K token context window (~50K chars = ~12K tokens).
#
llm_max_chars: 50000
llm_max_lines: 1500

# ── LLM merge hints ──────────────────────────────────────────────────────────
# Free-text guidance appended to every LLM merge prompt as "Additional
# project-specific guidance".  Use this to encode domain preferences that
# should influence how the LLM resolves ambiguous merges.
# Per-project overrides are supported by adding a merge_hints key inside the
# project entry in the registry below.
#
merge_hints: |
  Simics7: in .simics scripts prefer $uart.wait-for-string and
  $system.serconsole.con.wait-for-string over bp.console_string.wait-for.
  Keep wait-for-hap patterns (e.g. wait-for-hap X86_HLT_Instr) and other
  Simics7 HAP-based synchronisation intact.
  Preserve Simics7 Python module imports and runtime-loader patterns.
  In NBCLASS / CLASS_ assignments keep SLES12 (not SLES11).
  For simics_path in .cth files use /p/hdk/cad/windriver/simics/toolversion(simics)
  (standard CTH toolversion lookup); use cth_query-based SIMICS_HOME in Makefiles.
  For scripts/soc_moab.py: use the HSLE/donor version — keep the GCD softlink
  block (gcdu/gcds/gcdp loop) UNCOMMENTED and active; use is_line_empty as
  exact match (line == '') not strip-based (line.strip() == '').

# Files to copy verbatim into the output model, bypassing merge entirely.
# Keys are relative paths inside the output model; values are absolute source
# paths.  Applied after all ADDED/MODIFIED/REMOVED steps, so they always win.
# Note: files under assets/ are applied automatically without needing an entry
# here — add project-specific one-off overrides here only.
file_overrides: {}

# ── Line patches ─────────────────────────────────────────────────────────────
# Comment out (or otherwise patch) specific lines in output model files after
# all other steps.  Applied in apply mode only (not dry-run).
#
# Fields:
#   file         relative path inside the output model
#   match        substring that identifies the line(s) to patch (exact substring match)
#   action       comment_out  (only action currently supported)
#   comment_char character(s) to prefix the commented line  [default: #]
#   reason       human-readable note logged during conversion
#
line_patches:
  - file:         cfg/trex/emulation_TREX.pm
    match:        "unshift(@{$main::Test_Info{'Model_Tool_Args'}}, '-plugin', $ENV{WORKAREA} . '/verif/emu/plugins/emurun/zebu_libstdc_override.pm');"
    action:       comment_out
    comment_char: "#"
    reason:       "zebu_libstdc_override plugin causes collisions in Simics7 environment"

# ── Output ───────────────────────────────────────────────────────────────────
# Stem name for the report files written into the output directory.
report_name: conversion_report

# Unix group to assign to all files and directories in the output model.
# Every output path will also have u+w and g+w set so the group can modify it.
# Set to "" or remove this key to skip group assignment.
output_group: soc

# ── Project registry ─────────────────────────────────────────────────────────
# Maps project aliases to their analysis file + optional project-specific overrides.
# Aliases are case-insensitive; dashes and underscores are normalized to nothing
# so "nvl-ax", "nvl_ax", and "nvlax" all resolve to the same entry.
#
# Supported per-project keys (all optional — fall back to global defaults above):
#   analysis      path to analysis_heuristic.md for that project  [REQUIRED]
#   description   human-readable label shown in the converter banner
#   donor         default donor HSLE model path (can be overridden with --donor)
#   output_group  unix group for output files
#   patch_mode    3way | llm | auto
#
projects:
  nvlax:
    description: "NVL-AX SLE → HSLE hybridization"
    analysis: /nfs/site/disks/ive_nvl_efs_pgesyuk_001/hybridization/analysis_nvlax/analysis_heuristic.md
    donor: /nfs/site/disks/ive_nvl_efs_pgesyuk_001/hybridization/src_donor_models/sle_emu-nvlax-a0-26ww12a_hsle_v07_cores__msr_co
    output_group: soc

  nvls:
    description: "NVL-S SLE → HSLE hybridization (RTL Core PM / IA core stub)"
    analysis: /nfs/site/disks/ive_nvl_efs_pgesyuk_001/hybridization/analysis_nvls/analysis_heuristic.md
    output_group: soc
