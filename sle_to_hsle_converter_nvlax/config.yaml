# HSLE Converter — config.yaml (NVLax example)
# All settings can be overridden via CLI flags.

# ── Default analysis and donor paths ─────────────────────────────────────────
# analysis_path: default analysis.md used when --analysis is not provided on CLI.
# This must point to the NVL-AX-specific analysis (26ww12a SLE → 26ww12a HSLE)
# so that all NVL-AX HSLE-specific files (reglist/nvlsi7_n2p/emu/hsle/, etc.)
# are correctly ADDED during conversion.
#
# donor_path: default donor HSLE model used when --donor is not provided on CLI.
# Should be the NVL-AX reference HSLE model (same one used in the analysis).
#
analysis_path: /nfs/site/disks/ive_nvl_efs_pgesyuk_001/hybridization/analysis_nvlax/analysis_heuristic.md
donor_path: /nfs/site/disks/ive_nvl_efs_pgesyuk_001/hybridization/src_donor_models/sle_emu-nvlax-a0-26ww12a_hsle_v07_cores__msr_co

# ── ADDED file conflict policy ───────────────────────────────────────────────
# Controls what happens when an ADDED file's relative path already exists in
# the new SLE model being converted.
#
#   manual  (recommended) — flag for human review; safe for versioned models
#   auto    — overwrite if content differs from ref_hsle; risky for new variants
#
added_conflict_policy: manual

# ── REMOVED file safety check ───────────────────────────────────────────────
# When true: only auto-delete if the file in the new model still matches the
# reference SLE content exactly (i.e. it was not updated in the new model).
# When false: always delete, regardless of content.
#
removed_safety_check: true

# ── Paths to remove from the output after the SLE copy ───────────────────────
# After the SLE tree is copied to the output directory, these paths are
# unconditionally deleted (file, symlink, or directory).  Use this for:
#   • Directory symlinks in the SLE that become broken (or redundant) in the
#     HSLE output (e.g. path aliases that point to directories which are
#     renamed by path_remaps).
#   • Compile-output subdirectories nested under otherwise-kept directories
#     (when the directory name is not unique enough to include in
#     _COMPILE_OUTPUT_DIRS globally).
#
paths_to_remove:
  # nvlax path-alias symlinks: cdie0/hub → ../nvlsi7/cdie0/ etc.
  # In the SLE these are convenience aliases.  In the output the target
  # directory is remapped to nvlsi7_n2p/, so the symlinks are broken and
  # must be removed.
  - src/val/emu/rtlchanges/soc/nvlax/cdie0
  - src/val/emu/rtlchanges/soc/nvlax/hub
  # UPF hotfix symlinks: nvlp/nvlsi7/nvlsi9 → nvlsi5  (SLE path aliases).
  # Present in 26ww16a SLE but not in the reference HSLE model.
  - integration/hotfix/upf/soc/nvlp
  - integration/hotfix/upf/soc/nvlsi7
  - integration/hotfix/upf/soc/nvlsi9
  # Codegen IP_SS_ENABLES files nested under integration/hotfix/ filelist
  # directories.  These are compile-pipeline outputs regenerated every build.
  - integration/hotfix/cdie_filelist/cdie0/src/codegen
  - integration/hotfix/hubs_filelist/hub/src/codegen

# ── MODIFIED file merge strategy ────────────────────────────────────────────
#   3way  — git merge-file only; flag 'conflicts' if any conflict markers remain
#   llm   — use GitHub Copilot LLM only (no 3-way attempt)
#   auto  — try 3-way first; fall back to LLM on conflict/error; flag if LLM fails
#
patch_mode: auto

# ── LLM file size limits ─────────────────────────────────────────────────────
# Files exceeding either limit are flagged as 'too_large' and go to manual review
# instead of being sent to the LLM.
#
llm_max_chars: 10000
llm_max_lines: 300

# ── LLM merge hints ──────────────────────────────────────────────────────────
# Free-text guidance appended to every LLM merge prompt as "Additional
# project-specific guidance".  Use this to encode domain preferences that
# should influence how the LLM resolves ambiguous merges.
#
merge_hints: |
  Simics7: in .simics scripts prefer $uart.wait-for-string and
  $system.serconsole.con.wait-for-string over bp.console_string.wait-for.
  Keep wait-for-hap patterns (e.g. wait-for-hap X86_HLT_Instr) and other
  Simics7 HAP-based synchronisation intact.
  Preserve Simics7 Python module imports and runtime-loader patterns.
  In NBCLASS / CLASS_ assignments keep SLES12 (not SLES11).
  For simics_path in .cth files use /p/hdk/cad/windriver/simics/toolversion(simics)
  (standard CTH toolversion lookup); use cth_query-based SIMICS_HOME in Makefiles.
  For scripts/soc_moab.py: use the HSLE/donor version — keep the GCD softlink
  block (gcdu/gcds/gcdp loop) UNCOMMENTED and active; use is_line_empty as
  exact match (line == '') not strip-based (line.strip() == '').

