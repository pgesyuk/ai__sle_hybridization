# HSLE Converter — config.yaml (NVLax example)
# All settings can be overridden via CLI flags.

# ── ADDED file conflict policy ───────────────────────────────────────────────
# Controls what happens when an ADDED file's relative path already exists in
# the new SLE model being converted.
#
#   manual  (recommended) — flag for human review; safe for versioned models
#   auto    — overwrite if content differs from ref_hsle; risky for new variants
#
added_conflict_policy: manual

# ── REMOVED file safety check ───────────────────────────────────────────────
# When true: only auto-delete if the file in the new model still matches the
# reference SLE content exactly (i.e. it was not updated in the new model).
# When false: always delete, regardless of content.
#
removed_safety_check: true

# ── MODIFIED file merge strategy ────────────────────────────────────────────
#   3way  — git merge-file only; flag 'conflicts' if any conflict markers remain
#   llm   — use GitHub Copilot LLM only (no 3-way attempt)
#   auto  — try 3-way first; fall back to LLM on conflict/error; flag if LLM fails
#
patch_mode: auto

# ── LLM file size limits ─────────────────────────────────────────────────────
# Files exceeding either limit are flagged as 'too_large' and go to manual review
# instead of being sent to the LLM.
#
llm_max_chars: 10000
llm_max_lines: 300

# ── LLM merge hints ──────────────────────────────────────────────────────────
# Free-text guidance appended to every LLM merge prompt as "Additional
# project-specific guidance".  Use this to encode domain preferences that
# should influence how the LLM resolves ambiguous merges.
#
merge_hints: |
  Simics7: in .simics scripts prefer $uart.wait-for-string and
  $system.serconsole.con.wait-for-string over bp.console_string.wait-for.
  Keep wait-for-hap patterns (e.g. wait-for-hap X86_HLT_Instr) and other
  Simics7 HAP-based synchronisation intact.
  Preserve Simics7 Python module imports and runtime-loader patterns.
  In NBCLASS / CLASS_ assignments keep SLES12 (not SLES11).
  For simics_path in .cth files use /p/hdk/cad/windriver/simics/toolversion(simics)
  (standard CTH toolversion lookup); use cth_query-based SIMICS_HOME in Makefiles.
  For scripts/soc_moab.py: use the HSLE/donor version — keep the GCD softlink
  block (gcdu/gcds/gcdp loop) UNCOMMENTED and active; use is_line_empty as
  exact match (line == '') not strip-based (line.strip() == '').

# Files to copy verbatim into the output model, bypassing merge entirely.
# Keys are relative paths inside the output model; values are absolute source
# paths.  Applied after all ADDED/MODIFIED/REMOVED steps, so they always win.
file_overrides: {}

# ── Path remaps ──────────────────────────────────────────────────────────────
# Remap analysis entry paths to project-specific output destinations.
# Applies to ADDED, MODIFIED, and REMOVED entries.
# Source lookup (ref_hsle, ref_sle, donor) always uses the ORIGINAL path;
# only the output destination is remapped.
# Used to handle cross-project analyses where die/variant names differ.
#
path_remaps:
  # NVL-AX is a single-die n2p model (cdie0 only).
  # NVL-S analyses use nvlsi7/cdie1 for single-die content; remap to nvlsi7_n2p/cdie0.
  - from: "src/val/emu/rtlchanges/soc/nvlsi7/cdie1/"
    to:   "src/val/emu/rtlchanges/soc/nvlsi7_n2p/cdie0/"

# ── Output ───────────────────────────────────────────────────────────────────
# Stem name for the report files written into the output directory.
report_name: conversion_report

# Unix group to assign to all files and directories in the output model.
# Every output path will also have u+w and g+w set so the group can modify it.
# Set to "" or remove this key to skip group assignment.
output_group: soc
