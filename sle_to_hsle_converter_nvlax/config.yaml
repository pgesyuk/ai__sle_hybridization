# ── Line patches ─────────────────────────────────────────────────────────────
# Comment out (or otherwise patch) specific lines in output model files after
# all other steps.  Applied in apply mode only (not dry-run).
#
# Fields:
#   file         relative path inside the output model
#   match        substring that identifies the line(s) to patch (exact substring match)
#   action       comment_out  (only action currently supported)
#   comment_char character(s) to prefix the commented line  [default: #]
#   reason       human-readable note logged during conversion
#
line_patches:
  - file:         cfg/trex/emulation_TREX.pm
    match:        "unshift(@{$main::Test_Info{'Model_Tool_Args'}}, '-plugin', $ENV{WORKAREA} . '/verif/emu/plugins/emurun/zebu_libstdc_override.pm');"
    action:       comment_out
    comment_char: "#"
    reason:       "zebu_libstdc_override plugin causes collisions in Simics7 environment"

# ── Path remaps ──────────────────────────────────────────────────────────────
# Remap analysis entry paths to project-specific output destinations.
# Applies to ADDED, MODIFIED, and REMOVED entries.
# Source lookup (ref_hsle, ref_sle, donor) always uses the ORIGINAL path;
# only the output destination is remapped.
# Used to handle cross-project analyses where die/variant names differ.
#
path_remaps:
  # NVL-AX is a single-die n2p model (cdie0 only).
  # NVL-S analyses use nvlsi7/cdie1 for single-die content; remap to nvlsi7_n2p/cdie0.
  - from: "src/val/emu/rtlchanges/soc/nvlsi7/cdie1/"
    to:   "src/val/emu/rtlchanges/soc/nvlsi7_n2p/cdie0/"

# ── Content patches ───────────────────────────────────────────────────────────
# Bulk text substitution sweep over output files matching a path prefix.
# Applied after all ADDED/MODIFIED/REMOVED steps, file_overrides, line_patches.
# Binary files are always skipped.
#
# Fields:
#   path_pattern   path prefix relative to output root (leave empty to match all)
#   substitutions  list of {match, replace} pairs (plain string replacement)
#   reason         human-readable note logged during conversion
#
# content_patches:
#   The cdie1→cdie0 bulk substitution has been REMOVED.  In the reference model
#   (semi_ai__rtl_core_pm_01__co) the engineer kept the SLE versions of all
#   testbench, firmware, and script files — none of those should have cdie1
#   replaced with cdie0 globally.  Legitimate per-file cdie1→cdie0 changes are
#   handled via file_overrides above.
#
#   Do NOT re-enable a broad src/val/emu/ substitution: it corrupts firmware
#   text disassemblies, Python cdie1_context attributes, CDIE1_OVERRIDE module
#   names, and dozens of other files that must retain cdie1 semantics.

# ── Output ───────────────────────────────────────────────────────────────────
# Stem name for the report files written into the output directory.
report_name: conversion_report

# Unix group to assign to all files and directories in the output model.
# Every output path will also have u+w and g+w set so the group can modify it.
# Set to "" or remove this key to skip group assignment.
output_group: soc
